<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Briefcase body -->
  <rect x="4" y="12" width="24" height="17" rx="3" fill="#2d1f6e" stroke="url(#glow)" stroke-width="1"/>

  <!-- Briefcase handle -->
  <path d="M11 12 L11 9 Q11 7 13 7 L19 7 Q21 7 21 9 L21 12"
        fill="none" stroke="url(#glow)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- CV text -->
  <text x="16" y="24" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="9" fill="url(#glow)" text-anchor="middle" letter-spacing="-0.5">CV</text>

  <!-- Plus badge -->
  <circle cx="25" cy="11" r="4" fill="#0d0820" stroke="url(#glow)" stroke-width="1"/>
  <text x="25" y="14.5" font-family="Arial" font-weight="bold" font-size="7"
        fill="url(#glow)" text-anchor="middle">+</text>
</svg>